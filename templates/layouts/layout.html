{{define "layout"}}
<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smply • Fast & Simple URL Shortener • {{.Title}}</title>
  <meta name="description"
    content="Smply is a fast, clean URL shortener. Create short links instantly with zero friction." />
  <meta property="og:title" content="Smply – URL Shortener" />
  <meta property="og:description" content="Fast, clean link shortening with no noise." />
  <meta property="og:url" content="https://smply.cc/" />
  <meta property="og:type" content="website" />
  <link rel="icon" href="/favicon.ico" />
  <link rel="stylesheet" href="/static/css/style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" defer></script>
</head>

<body>
  <nav class="nav" id="nav">
    <div class="container">
      <div class="nav-inner">

        <a href="/" class="nav-logo">
          <div class="logo-mark">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
              <rect width="32" height="32" rx="8" fill="#0d0f12" />
              <path d="M9 16a7 7 0 0 1 14 0" stroke="white" stroke-width="2.2" fill="none" stroke-linecap="round" />
              <circle cx="16" cy="16" r="2.5" fill="white" />
            </svg>
          </div>
          <p>smply<span class="logo-tld">.cc</span></p>
        </a>

        <!-- desktop links -->
        <ul class="nav-links">
          <li><a href="/" {{if eq .Page "home" }}class="active" {{end}}>Home</a></li>
          <li><a href="/shorten" {{if eq .Page "shorten" }}class="active" {{end}}>Shorten</a></li>
          <li><a href="/api" {{if eq .Page "api" }}class="active" {{end}}>API</a></li>
        </ul>

        <div class="nav-right">
          <a href="https://github.com/KhalidHayKay/Smply" class="nav-github" target="_blank" rel="noopener"
            aria-label="GitHub repo">
            <svg viewBox="0 0 98 96">
              <path fill-rule="evenodd" clip-rule="evenodd"
                d="M48.854 0C21.839 0 0 22 0 49.217c0 21.756 13.993 40.172 33.405 46.69 2.427.49 3.316-1.059 3.316-2.362 0-1.141-.08-5.052-.08-9.127-13.59 2.934-16.42-5.867-16.42-5.867-2.184-5.704-5.42-7.17-5.42-7.17-4.448-3.015.324-3.015.324-3.015 4.934.326 7.523 5.052 7.523 5.052 4.367 7.496 11.404 5.378 14.235 4.074.404-3.178 1.699-5.378 3.074-6.6-10.839-1.141-22.243-5.378-22.243-24.283 0-5.378 1.94-9.778 5.014-13.2-.485-1.222-2.184-6.275.486-13.038 0 0 4.125-1.304 13.426 5.052a46.97 46.97 0 0 1 12.214-1.63c4.125 0 8.33.571 12.213 1.63 9.302-6.356 13.427-5.052 13.427-5.052 2.67 6.763.97 11.816.485 13.038 3.155 3.422 5.015 7.822 5.015 13.2 0 18.905-11.404 23.06-22.324 24.283 1.78 1.548 3.316 4.481 3.316 9.126 0 6.6-.08 11.897-.08 13.526 0 1.304.89 2.853 3.316 2.364 19.412-6.52 33.405-24.935 33.405-46.691C97.707 22 75.788 0 48.854 0z" />
            </svg>
          </a>

          <!-- hamburger — mobile only -->
          <button class="nav-burger" id="nav-burger" aria-label="Toggle menu" aria-expanded="false">
            <span></span><span></span><span></span>
          </button>
        </div>

      </div>
    </div>

    <!-- mobile drawer -->
    <div class="nav-drawer" id="nav-drawer" aria-hidden="true">
      <ul class="nav-drawer-links">
        <li><a href="/" {{if eq .Page "home" }}class="active" {{end}}>Home</a></li>
        <li><a href="/shorten" {{if eq .Page "shorten" }}class="active" {{end}}>Shorten</a></li>
        <li><a href="/api" {{if eq .Page "api" }}class="active" {{end}}>API</a></li>
      </ul>
    </div>
  </nav>

  {{block "content" .}}{{end}}

  <footer class="footer">
    <div class="container">
      <div class="footer-inner">
        <div class="footer-left">
          <span class="footer-wordmark">smply<span class="tld">.cc</span></span>
          <div class="footer-sep"></div>
          <span class="footer-byline">
            long URLs, simplified.
          </span>
        </div>
        <div class="footer-right">
          <a href="https://x.com/khalidhaykay" class="footer-icon-link" target="_blank" rel="noopener"
            aria-label="X / Twitter">
            <svg viewBox="0 0 24 24">
              <path
                d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.741l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z" />
            </svg>
          </a>
          <a href="https://github.com/KhalidHayKay/Smply" class="footer-icon-link" target="_blank" rel="noopener"
            aria-label="GitHub">
            <svg viewBox="0 0 98 96">
              <path fill-rule="evenodd" clip-rule="evenodd"
                d="M48.854 0C21.839 0 0 22 0 49.217c0 21.756 13.993 40.172 33.405 46.69 2.427.49 3.316-1.059 3.316-2.362 0-1.141-.08-5.052-.08-9.127-13.59 2.934-16.42-5.867-16.42-5.867-2.184-5.704-5.42-7.17-5.42-7.17-4.448-3.015.324-3.015.324-3.015 4.934.326 7.523 5.052 7.523 5.052 4.367 7.496 11.404 5.378 14.235 4.074.404-3.178 1.699-5.378 3.074-6.6-10.839-1.141-22.243-5.378-22.243-24.283 0-5.378 1.94-9.778 5.014-13.2-.485-1.222-2.184-6.275.486-13.038 0 0 4.125-1.304 13.426 5.052a46.97 46.97 0 0 1 12.214-1.63c4.125 0 8.33.571 12.213 1.63 9.302-6.356 13.427-5.052 13.427-5.052 2.67 6.763.97 11.816.485 13.038 3.155 3.422 5.015 7.822 5.015 13.2 0 18.905-11.404 23.06-22.324 24.283 1.78 1.548 3.316 4.481 3.316 9.126 0 6.6-.08 11.897-.08 13.526 0 1.304.89 2.853 3.316 2.364 19.412-6.52 33.405-24.935 33.405-46.691C97.707 22 75.788 0 48.854 0z" />
            </svg>
          </a>
        </div>
      </div>
    </div>
  </footer>

  <script src="/static/js/app.js"></script>
  <script>
    // ── Mobile nav ──
    (function () {
      var burger = document.getElementById('nav-burger');
      var drawer = document.getElementById('nav-drawer');
      var open = false;

      burger.addEventListener('click', function () {
        open = !open;
        burger.classList.toggle('is-open', open);
        drawer.classList.toggle('is-open', open);
        burger.setAttribute('aria-expanded', open);
        drawer.setAttribute('aria-hidden', !open);
      });

      // close on link tap
      drawer.querySelectorAll('a').forEach(function (a) {
        a.addEventListener('click', function () {
          open = false;
          burger.classList.remove('is-open');
          drawer.classList.remove('is-open');
          burger.setAttribute('aria-expanded', false);
          drawer.setAttribute('aria-hidden', true);
        });
      });
    }());
  </script>
</body>

</html>
{{end}}
