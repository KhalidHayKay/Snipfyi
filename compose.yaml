services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_ENV: ${APP_ENV}
    env_file:
      - .env
    image: smply-app
    container_name: smply-app
    restart: unless-stopped
    working_dir: /app/
    ports:
      - "8000:8000"
  worker:
    image: smply-app
    container_name: smply-worker
    restart: unless-stopped
    env_file:
      - .env
    entrypoint: ["/bin/sh", "-c", "exec sh start.worker.sh"]
    depends_on:
      - db
      - redis
  db:
    image: postgres:16
    container_name: smply-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: smply
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:8-alpine
    container_name: smply-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--requirepass", "admin"]

volumes:
  pgdata:
  go-module-cache:
